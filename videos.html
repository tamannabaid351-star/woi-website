<!DOCTYPE html>
<html>

<head>
<link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />

<title>Video Ads</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Poppins;
background:#f6f8fb;
}

/* header */

.header{
text-align:center;
padding:70px 20px;
}

.header h1{
font-size:40px;
margin:0;
}

/* gallery */

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
padding:40px 8%;
max-width:1200px;
margin:auto;
}

/* card */

.card{
background:white;
border-radius:20px;
overflow:hidden;
box-shadow:0 20px 40px rgba(0,0,0,0.15);
cursor:pointer;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

.card video{
width:100%;
display:block;
}

/* fullscreen */

.lightbox{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
align-items:center;
justify-content:center;
z-index:1000;
}

.lightbox video{
max-width:80%;
max-height:80%;
}

.close{
position:absolute;
top:30px;
right:40px;
font-size:35px;
color:white;
cursor:pointer;
}

/* back button */

.back{
text-align:center;
padding:50px;
}

.back a{
background:#111;
color:white;
padding:12px 25px;
border-radius:30px;
text-decoration:none;
}

</style>

</head>

<body>

<div class="header">
<h1>Video Ads</h1>
</div>

<div class="gallery">

<div class="card" onclick="openLightbox('images/videos/video1.mp4')">
<video muted loop>
<source src="images/videos/video1.mp4">
</video>
</div>

<div class="card" onclick="openLightbox('images/videos/video1.mp4')">
<video muted loop>
<source src="images/videos/video2.mp4">
</video>
</div>

<div class="card" onclick="openLightbox('images/videos/video1.mp4')">
<video muted loop>
<source src="images/videos/video3.mp4">
</video>
</div>

<div class="card" onclick="openLightbox('images/videos/video1.mp4')">
<video muted loop>
<source src="images/videos/video4.mp4">
</video>
</div>

</div>

<div class="back">
<a href="index.html"><Back to Homepage></a>
</div>

<div class="lightbox" id="lightbox">
<span class="close" onclick="closeLightbox()">✕</span>
<video id="lightbox-video" controls autoplay></video>
</div>

<script>

function openLightbox(src){

let box=document.getElementById("lightbox");
let vid=document.getElementById("lightbox-video");

vid.src=src;
box.style.display="flex";

}

function closeLightbox(){
document.getElementById("lightbox").style.display="none";
document.getElementById("lightbox-video").pause();
}

document.querySelectorAll("video").forEach(video=>{

video.addEventListener("mouseenter",()=>video.play());

video.addEventListener("mouseleave",()=>{
video.pause();
video.currentTime=0;
});

});

</script>
<script src="https://unpkg.com/aos@next/dist/aos.js"></script>

<script>
AOS.init({
duration:1000,
once:true
});
</script>
</body>
</html>
