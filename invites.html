<!DOCTYPE html>
<html>

<head>
<link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
<title>Invitation Designs</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Poppins;
background:linear-gradient(120deg,#f6f8fb,#e8edf5);
overflow-x:hidden;
}

/* background glow */

.bg{
position:fixed;
width:400px;
height:400px;
border-radius:50%;
filter:blur(120px);
opacity:0.6;
z-index:-1;
animation:move 12s infinite alternate;
}

.bg1{background:#ff8aa0;top:-150px;left:-150px;}
.bg2{background:#6f8cff;bottom:-150px;right:-150px;}

@keyframes move{
0%{transform:translate(0,0);}
100%{transform:translate(100px,80px);}
}

/* cursor glow */

.cursor{
position:fixed;
width:200px;
height:200px;
border-radius:50%;
background:radial-gradient(circle,rgba(255,255,255,0.6),transparent);
pointer-events:none;
transform:translate(-50%,-50%);
z-index:999;
}

/* header */

.header{
text-align:center;
padding:70px 20px;
}

.header h1{
font-size:40px;
margin:0;
}

/* gallery */

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:30px;
padding:40px 8%;
max-width:1200px;
margin:auto;
}

/* cards */

.card{
border-radius:20px;
overflow:hidden;
height:420px;
box-shadow:0 20px 40px rgba(0,0,0,0.15);
cursor:pointer;
transition:0.4s;
transform-style:preserve-3d;
}

.card:hover{
transform:rotateY(6deg) rotateX(6deg) scale(1.03);
}

.card img,
.card video{
width:100%;
height:100%;
object-fit:cover;
}

/* fullscreen viewer */

.lightbox{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
align-items:center;
justify-content:center;
z-index:1000;
}

.lightbox img,
.lightbox video{
max-width:90%;
max-height:90%;
border-radius:10px;
}

.close{
position:absolute;
top:30px;
right:40px;
font-size:35px;
color:white;
cursor:pointer;
}

/* back button */

.back{
text-align:center;
padding:50px;
}

.back a{
background:#111;
color:white;
padding:12px 25px;
border-radius:30px;
text-decoration:none;
}

</style>

</head>

<body>

<div class="bg bg1"></div>
<div class="bg bg2"></div>

<div class="cursor" id="cursor"></div>

<div class="header" data-aos="fade-down">
<h1>Invitation Designs</h1>
</div>

<div class="gallery">

<div class="card" data-aos="zoom-in" data-aos-delay="100"
onclick="openLightbox('video','images/invites/invite1.mp4')">
<video muted loop>
<source src="images/invites/invite1.mp4">
</video>
</div>

<div class="card" data-aos="zoom-in" data-aos-delay="200"
onclick="openLightbox('image','images/invites/invite2.jpeg')">
<img src="images/invites/invite2.jpeg">
</div>

<div class="card" data-aos="zoom-in" data-aos-delay="300"
onclick="openLightbox('image','images/invites/invite2.jpeg')">
<video muted loop>
<source src="images/invites/invite3.mp4">
</video>
</div>

</div>

<div class="back" data-aos="fade-up">
<a href=index.html>
>Back to Homepage</a>
</div>

<div class="lightbox" id="lightbox">
<span class="close" onclick="closeLightbox()">✕</span>
<div id="lightbox-content"></div>
</div>

<script>

function openLightbox(type,src){

let box=document.getElementById("lightbox");
let content=document.getElementById("lightbox-content");

if(type==="image"){
content.innerHTML='<img src="'+src+'">';
}

if(type==="video"){
content.innerHTML='<video controls autoplay src="'+src+'"></video>';
}

box.style.display="flex";

}

function closeLightbox(){
document.getElementById("lightbox").style.display="none";
}

/* hover video preview */

document.querySelectorAll("video").forEach(video=>{

video.addEventListener("mouseenter",()=>video.play());

video.addEventListener("mouseleave",()=>{
video.pause();
video.currentTime=0;
});

});

/* cursor glow */

const cursor=document.getElementById("cursor");

document.addEventListener("mousemove",(e)=>{
cursor.style.left=e.clientX+"px";
cursor.style.top=e.clientY+"px";
});

</script>
<script src="https://unpkg.com/aos@next/dist/aos.js"></script>

<script>
AOS.init({
duration:1000,
once:true
});
</script>
</body>
</html>
